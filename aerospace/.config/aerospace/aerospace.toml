config-version = 2
start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'accordion'
default-root-container-orientation = 'horizontal'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

persistent-workspaces = ["1", "2", "3", "4", "5"]

[key-mapping]
    preset = 'qwerty'

[mode.main.binding]
    alt-enter = '''exec-and-forget open -a Kitty'''
    alt-backtick = '''exec-and-forget kitten quick-access-terminal'''
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'

    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'

    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    f = ['layout floating tiling', 'mode main']

[workspace-to-monitor-force-assignment]
    "1" = 1

[[on-window-detected]]
if.app-id = 'net.kovidgoyal.kitty'
run = ['move-node-to-workspace 5']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.figma.Desktop'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.mikrotik.winbox'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'org.jkiss.dbeaver.core.product'
run = ['move-node-to-workspace 1']

# Workspace 2: IDEs
[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.google.android.studio'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.todesktop.230313mzl4w4u92' # Cursor
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.openai.codex'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.apple.dt.Xcode'
run = ['move-node-to-workspace 2']

# Floating apps
[[on-window-detected]]
if.app-id = 'com.apple.iphonesimulator'
run = 'layout floating'

# Workspace 3: IM
[[on-window-detected]]
if.app-id = 'com.tencent.xinWeChat'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.tencent.qq'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = ['move-node-to-workspace 3']

# Workspace 4: Notes & Mindmaps
[[on-window-detected]]
if.app-id = 'md.obsidian'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'net.xmind.vana.app'
run = ['move-node-to-workspace 4']
