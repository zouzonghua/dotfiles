# Interval and lengths are defined in statusline-dark.conf.

# Selenized Light overrides
set-option -g status-bg "#ece3cc"
set-option -g status-fg "#53676d"
set-option -g pane-border-style "fg=#909995"
set-option -g pane-active-border-style "fg=#0072d4"
set-option -g status-left "#[fg=#53676d,bg=#ece3cc]#{?client_prefix,#[reverse],} Session: #S #[default]"
set-option -g status-right "#[fg=#53676d,bg=#ece3cc] #(~/.config/tmux/bin/cpu_load.sh '#489100' '#ad8900' '#d2212d') #[default]"
set-window-option -g window-status-format "#[fg=#53676d,bg=#ece3cc] #I: #W #[default]"
set-window-option -g window-status-current-format "#[fg=#fbf3db,bg=#0072d4,bold] #I: #W #[default]"
