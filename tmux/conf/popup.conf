# Popup bindings
set -g @tmux_popup_script "$HOME/.config/tmux/bin/tmux-popup.sh"

# Display lazygit
bind -n M-g run-shell -b 'nohup "#{@tmux_popup_script}" smart lazygit "#{pane_current_path}" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'

# Open a persistent terminal popup at the top
# Reopen it later to resume the same shell state.
unbind -n C-t
bind -n C-t run-shell -b 'nohup "#{@tmux_popup_script}" smart term "#{pane_current_path}" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'

# AI tools menu
# Use mnemonic keys inside the menu: c=Claude, x=Codex, g=Gemini, h=Hermes.
# prefix+a opens the launcher normally.
# Inside AI popups, prefix+a and M-a close the current popup first, then reopen the launcher on the outer client.
bind -r a run-shell -b 'nohup "#{@tmux_popup_script}" smart show "" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'
bind -r q run-shell -b 'nohup "#{@tmux_popup_script}" smart show-quick "" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'
bind -r f run-shell -b 'nohup "#{@tmux_popup_script}" smart nnn "#{pane_current_path}" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'

bind -n M-a run-shell -b 'nohup "#{@tmux_popup_script}" smart show "" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'
bind -n M-q run-shell -b 'nohup "#{@tmux_popup_script}" smart show-quick "" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'
