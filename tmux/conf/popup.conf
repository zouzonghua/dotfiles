# Popup bindings
set -g @tmux_popup_script "$HOME/.config/tmux/bin/tmux-popup.sh"

# Git popup binding
bind -n M-g run-shell -b 'nohup "#{@tmux_popup_script}" context/dispatch popup/toggle-git "#{pane_current_path}" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'

# Files popup binding
bind -r f run-shell -b 'nohup "#{@tmux_popup_script}" context/dispatch popup/toggle-files "#{pane_current_path}" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'

# Terminal popup binding
bind -n C-t run-shell -b 'nohup "#{@tmux_popup_script}" context/dispatch popup/toggle-term "#{pane_current_path}" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'

# AI tools/quick tools menu bindings
# Use mnemonic keys in the menu: a=AI tools, q=Quick tools.
# prefix+a and M-a open the menu normally.
bind -r a run-shell -b 'nohup "#{@tmux_popup_script}" context/dispatch menu/show-ai "" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'
bind -r q run-shell -b 'nohup "#{@tmux_popup_script}" context/dispatch menu/show-quick "" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'
bind -n M-a run-shell -b 'nohup "#{@tmux_popup_script}" context/dispatch menu/show-ai "" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'
bind -n M-q run-shell -b 'nohup "#{@tmux_popup_script}" context/dispatch menu/show-quick "" "#{client_name}" "#{pane_id}" "#{session_name}" "#{@popup_outer_client}" "#{@popup_outer_pane}" >/dev/null 2>&1 &'
