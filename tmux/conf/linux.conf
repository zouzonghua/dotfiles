# Clipboard synchronization
set-option -g mouse on

if-shell '[ -n "$SSH_TTY" ]' {
  # When tmux is running over SSH, let OSC 52 carry text back to the outer terminal.
  set-option -s set-clipboard on
  bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel \; display-message "copied via terminal clipboard"
  bind -T copy-mode-vi y send -X copy-selection-and-cancel \; display-message "copied via terminal clipboard"
} {
  # On a local Linux desktop, keep using xsel for the system clipboard.
  set-option -s set-clipboard off
  bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'xsel -i -b' \; display-message "copied to system clipboard"
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xsel -i -b' \; display-message "copied to system clipboard"
}

# Linux uses the shared Solarized Dark status line from statusline-dark.conf.
