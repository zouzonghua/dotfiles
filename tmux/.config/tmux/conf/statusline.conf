# Interval for updating the status line
set-option -g status-interval 1
set-option -g @cpu_load ""
run-shell -b 'TMUX_CPU_LOAD_INTERVAL=1 ~/.config/tmux/bin/cpu-load-daemon.sh "#23d18b" "#f5f543" "#f14c4c"'

# Specify the maximum length of status-left
set-option -g status-left-length 40

# Specify the maximum length of status-right
set-option -g status-right-length 60

# VSCode Dark
set-option -g status-bg "#3a3d41"
set-option -g status-fg "#cccccc"
set-option -g pane-border-style "fg=#414140"
set-option -g pane-active-border-style "fg=#3b8eea"

set-option -g status-left "#[fg=#ffffff,bg=#3a3d41]#{?client_prefix,#[reverse],} ^ #[default]"
set-option -g status-right "#[fg=#cccccc,bg=#3a3d41] #{@cpu_load} #[default]"

set-window-option -g window-status-format "#[fg=#cccccc,bg=#3a3d41] #I #[default]"
set-window-option -g window-status-current-format "#[fg=#ffffff,bg=#264f78,bold] #I #[default]"

set-window-option -g window-status-activity-style "fg=#23d18b"
set-window-option -g window-status-bell-style "fg=#f14c4c,bg=#1e1e1e blink"
