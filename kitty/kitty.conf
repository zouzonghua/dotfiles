# -----------------------------------------------------------------------------
# 1. Window Layout & Startup
# -----------------------------------------------------------------------------
# Force initial window size instead of restoring the last closed one
remember_window_size    no

# Fallback dimensions to ensure the window fills any screen
initial_window_width    9999
initial_window_height   9999

# Decorations: Hide titlebar while keeping macOS traffic lights
# (red/yellow/green)
hide_window_decorations titlebar-only

# Window padding: Extra top padding to avoid overlap with window buttons
window_padding_width    5 5 0 5

# Transparency and blur effect (macOS only)
background_opacity      0.9
background_blur         20

# -----------------------------------------------------------------------------
# 2. Typography
# -----------------------------------------------------------------------------
font_size               14.0
font_family             SF Mono
bold_font               auto
italic_font             auto
bold_italic_font        auto

# -----------------------------------------------------------------------------
# 3. Cursor & Mouse
# -----------------------------------------------------------------------------
# Disable Kitty's cursor shape management to allow Shell/Vim customization
shell_integration       enabled no-cursor

# -----------------------------------------------------------------------------
# 4. Keyboard & Input
# -----------------------------------------------------------------------------
# Map Left Option key to Alt for terminal shortcut compatibility
macos_option_as_alt     left

# Close window without confirmation dialog
confirm_os_window_close 0

# -----------------------------------------------------------------------------
# 5. Themes & Colors
# -----------------------------------------------------------------------------
